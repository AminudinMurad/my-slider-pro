name: Close external pull requests

# This repository does not accept outside contributions. Anyone may fork it under
# the GPL-3.0 license, but pull requests opened by anyone other than the repository
# owner are closed automatically. Uses pull_request_target (base-repo token, no
# checkout of PR code) so it can close pull requests opened from forks.

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  close:
    if: github.event.pull_request.user.login != github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - name: Close and comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr comment "$PR" --repo "$REPO" --body "Thanks for your interest. This repository does not accept external pull requests; you're welcome to fork it under the GPL-3.0 license. Closing automatically."
          gh pr close "$PR" --repo "$REPO"
