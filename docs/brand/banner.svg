<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 260" role="img" aria-label="MY Slider PRO — fast, responsive, accessible sliders for WordPress" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b86cf"/>
      <stop offset="1" stop-color="#124f80"/>
    </linearGradient>
    <linearGradient id="bsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eaf3fb"/>
      <stop offset="1" stop-color="#cfe4f6"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="260" rx="28" fill="url(#bbg)"/>

  <!-- decorative peeking slides -->
  <rect x="40" y="86" width="26" height="88" rx="8" fill="#ffffff" opacity="0.18"/>
  <rect x="212" y="86" width="26" height="88" rx="8" fill="#ffffff" opacity="0.18"/>

  <!-- front slide -->
  <rect x="78" y="66" width="122" height="122" rx="16" fill="#ffffff"/>
  <clipPath id="bfront"><rect x="78" y="66" width="122" height="122" rx="16"/></clipPath>
  <g clip-path="url(#bfront)">
    <rect x="78" y="66" width="122" height="122" fill="url(#bsky)"/>
    <circle cx="168" cy="102" r="15" fill="#ffcf6b"/>
    <path d="M78 188 L120 130 L150 160 L176 126 L200 158 L200 188 Z" fill="#2271b1"/>
    <path d="M78 188 L108 154 L132 174 L160 148 L200 188 Z" fill="#17567f"/>
  </g>

  <!-- chevrons -->
  <path d="M60 118 l-11 9 l11 9" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <path d="M218 118 l11 9 l-11 9" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- dots -->
  <circle cx="119" cy="210" r="5" fill="#ffffff" opacity="0.5"/>
  <circle cx="139" cy="210" r="6" fill="#ffffff"/>
  <circle cx="159" cy="210" r="5" fill="#ffffff" opacity="0.5"/>

  <!-- wordmark -->
  <text x="282" y="118" fill="#ffffff" font-size="56" font-weight="800" letter-spacing="0.5">MY Slider PRO</text>
  <text x="284" y="158" fill="#d6e8f7" font-size="23">Fast, responsive, accessible sliders for WordPress.</text>

  <!-- meta chips -->
  <g font-size="14" fill="#eaf3fb">
    <rect x="284" y="182" width="118" height="30" rx="15" fill="#ffffff" opacity="0.14"/><text x="343" y="202" text-anchor="middle" fill="#ffffff">Open source</text>
    <rect x="412" y="182" width="96" height="30" rx="15" fill="#ffffff" opacity="0.14"/><text x="460" y="202" text-anchor="middle" fill="#ffffff">GPL-3.0</text>
    <rect x="518" y="182" width="150" height="30" rx="15" fill="#ffffff" opacity="0.14"/><text x="593" y="202" text-anchor="middle" fill="#ffffff">No dependencies</text>
  </g>
</svg>
